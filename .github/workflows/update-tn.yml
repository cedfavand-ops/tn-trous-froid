name: Mise à jour des Tn (trous à froid)

on:
  schedule:
    # 07:10 UTC = 09:10 à Paris en été (CEST) / 08:10 en hiver (CET).
    # Ajustez à 08:10 UTC si vous voulez viser 09:10 précisément en hiver.
    - cron: "10 7 * * *"
  workflow_dispatch: {}   # permet de lancer manuellement depuis l'onglet Actions

concurrency:
  group: tn-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install requests

      - name: Générer la page
        env:
          ECOWITT_APPLICATION_KEY: ${{ secrets.ECOWITT_APPLICATION_KEY }}
          ECOWITT_API_KEY: ${{ secrets.ECOWITT_API_KEY }}
          ECOWITT_MAC: ${{ secrets.ECOWITT_MAC }}
          DATACAKE_TOKENS_JSON: ${{ secrets.DATACAKE_TOKENS_JSON }}
          INFOCLIMAT_TOKEN: ${{ secrets.INFOCLIMAT_TOKEN }}
        run: python generate_tn_page.py

      - name: Publier (commit du fichier généré)
        run: |
          git config user.name "tn-bot"
          git config user.email "tn-bot@users.noreply.github.com"
          git add docs/index.html
